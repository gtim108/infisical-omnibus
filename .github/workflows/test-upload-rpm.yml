name: Test upload RPM packages

on:
    workflow_dispatch:

jobs:
    release-rpm:
        name: Upload RPM packages from artifact
        runs-on: ubuntu-latest
        steps:
            - name: Checkout source
              uses: actions/checkout@v3
              with:
                  fetch-depth: 0

            - name: Download artifact from run
              uses: actions/download-artifact@v4
              with:
                  name: rpm-packages
                  path: pkg
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  run-id: 23492423928

            - name: List downloaded packages
              run: ls -la pkg/

            - name: Install RPM signing tools
              run: |
                  sudo apt-get update
                  sudo apt-get install -y rpm

            - name: Install repogen
              run: |
                  curl -L https://github.com/ralt/repogen/releases/latest/download/repogen-linux-amd64 -o repogen
                  chmod +x repogen
                  sudo mv repogen /usr/local/bin/

            - name: Install AWS CLI
              uses: actions/setup-python@v4
              with:
                  python-version: "3.12"

            - name: Install awscli
              run: pip install awscli

            - name: Configure GPG Key
              run: echo -n "$GPG_SIGNING_KEY" | base64 --decode | gpg --batch --import
              env:
                  GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
                  GPG_SIGNING_KEY_PASSPHRASE: ${{ secrets.GPG_SIGNING_KEY_PASSPHRASE }}

            - name: Publish RPM packages
              run: sh test_upload_s3.sh
              env:
                  INFISICAL_BINARY_S3_BUCKET: ${{ secrets.INFISICAL_BINARY_S3_BUCKET }}
                  GPG_SIGNING_KEY_ID: ${{ secrets.GPG_SIGNING_KEY_ID }}
                  GPG_SIGNING_KEY_PASSPHRASE: ${{ secrets.GPG_SIGNING_KEY_PASSPHRASE }}
                  AWS_ACCESS_KEY_ID: ${{ secrets.INFISICAL_BINARY_REPO_AWS_ACCESS_KEY_ID }}
                  AWS_SECRET_ACCESS_KEY: ${{ secrets.INFISICAL_BINARY_REPO_AWS_SECRET_ACCESS_KEY }}
                  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.INFISICAL_BINARY_REPO_CLOUDFRONT_DISTRIBUTION_ID }}

    invalidate-cloudfront-cache:
        name: Invalidate Cloudfront cache
        needs:
            - release-rpm
        runs-on: ubuntu-latest
        steps:
            - uses: actions/setup-python@v4
              with:
                  python-version: "3.12"
            - name: Install AWS CLI
              run: pip install awscli
            - name: Invalidate Cloudfront cache
              run: aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_DISTRIBUTION_ID --paths "/dummy/rpm/Packages/*" "/dummy/rpm/repodata/*"
              env:
                  AWS_ACCESS_KEY_ID: ${{ secrets.INFISICAL_BINARY_REPO_AWS_ACCESS_KEY_ID }}
                  AWS_SECRET_ACCESS_KEY: ${{ secrets.INFISICAL_BINARY_REPO_AWS_SECRET_ACCESS_KEY }}
                  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.INFISICAL_BINARY_REPO_CLOUDFRONT_DISTRIBUTION_ID }}

    notify-pipeline-blocked:
        name: Notify incident.io if pipeline blocked
        runs-on: ubuntu-latest
        needs:
            - release-rpm
            - invalidate-cloudfront-cache
        if: always() && contains(needs.*.result, 'failure')
        steps:
            - name: Send blocked alert to incident.io
              env:
                  ALERT_URL: ${{ secrets.INCIDENT_IO_DEPLOY_ALERT_URL }}
                  ALERT_TOKEN: ${{ secrets.INCIDENT_IO_DEPLOY_ALERT_TOKEN }}
                  NEEDS_JSON: ${{ toJSON(needs) }}
                  RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
                  IMAGE_TAG: ${{ github.ref_name }}
                  ACTOR: ${{ github.actor }}
                  RUN_ID: ${{ github.run_id }}
              run: |
                  set -euo pipefail

                  # Guard against a misconfigured/rotated secret redirecting the POST (and the
                  # bearer token) to an unintended host: only allow the incident.io API origin.
                  case "$ALERT_URL" in
                    https://api.incident.io/*) ;;
                    *)
                      echo "::error::ALERT_URL does not point at https://api.incident.io/ — refusing to send alert."
                      exit 1
                      ;;
                  esac

                  FAILED=$(echo "$NEEDS_JSON" | jq -r 'to_entries | map(select(.value.result == "failure") | .key) | join(", ")')
                  BLOCKED=$(echo "$NEEDS_JSON" | jq -r 'to_entries | map(select(.value.result == "cancelled" or .value.result == "skipped") | .key) | join(", ")')
                  jq -n \
                    --arg title "[${{ github.repository }}] RPM upload pipeline blocked" \
                    --arg failed "${FAILED:-unknown}" \
                    --arg blocked "${BLOCKED:-none}" \
                    --arg dedup "rpm-upload-${RUN_ID}" \
                    --arg url "$RUN_URL" \
                    --arg tag "${IMAGE_TAG:-unknown}" \
                    --arg actor "$ACTOR" \
                    '{
                      title: $title,
                      description: ("Failed stage(s): " + $failed + "."),
                      deduplication_key: $dedup,
                      status: "firing",
                      source_url: $url,
                      metadata: { failed_stages: $failed, blocked_stages: $blocked, image_tag: $tag, actor: $actor }
                    }' \
                  | curl -sS --fail-with-body --connect-timeout 10 --max-time 30 -X POST "$ALERT_URL" \
                      -H "Authorization: Bearer $ALERT_TOKEN" \
                      -H "Content-Type: application/json" \
                      -d @-
